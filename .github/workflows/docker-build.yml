name: Build and Push to Aliyun ACR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 生成北京时间的时间戳
      - name: Generate timestamp
        id: vars
        run: |
          echo "tag_date=$(TZ='Asia/Shanghai' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # 2. 登录阿里云
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 3. 设置 Buildx（支持多平台构建及缓存优化）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # "." 代表根目录，Actions 会自动寻找其中的 Dockerfile
          context: .
          file: ./Dockerfile  # 显式指定，防患未然
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/portfolio-monitor:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/portfolio-monitor:${{ steps.vars.outputs.tag_date }}
          # 开启缓存，让下次构建变快
          cache-from: type=gha
          cache-to: type=gha,mode=max
